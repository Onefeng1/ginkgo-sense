# ==========================================
# GinkgoSense CI/CD Pipeline
# ==========================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linters
        run: pip install flake8 black isort

      - name: Flake8
        run: flake8 app.py model/ utils/ scripts/ tests/ --max-line-length=120 --ignore=E501,W503

      - name: Black check
        run: black --check --line-length=120 app.py model/ utils/ scripts/ tests/

      - name: Import order check
        run: isort --check-only --profile=black app.py model/ utils/ scripts/ tests/

  # 单元测试
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests
        run: |
          pytest tests/ -v --cov=model --cov=utils --cov=app \
            --cov-report=xml --cov-report=html \
            -x --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Docker构建测试
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ginkgo-sense:test .
          docker run --rm ginkgo-sense:test python -c "from model.classifier import GinkgoClassifier; print('Model loaded OK')"

      - name: Test Docker container
        run: |
          docker run -d --name ginkgo-test -p 5000:5000 ginkgo-sense:test
          sleep 10
          curl -f http://localhost:5000/info || exit 1
          docker stop ginkgo-test

  # 代码覆盖率报告
  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Coverage summary
        run: echo "Tests passed with coverage. Check Codecov for details."
